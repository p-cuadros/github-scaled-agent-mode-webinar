name: "Dependency Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'  # Run weekly on Mondays at 6 AM UTC

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        npm audit --audit-level=moderate

    - name: Run npm audit for vulnerabilities
      run: |
        npm audit --json --audit-level=low > audit-results.json || true
        
    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-audit-results
        path: audit-results.json

    - name: Check for high/critical vulnerabilities
      run: |
        CRITICAL=$(npm audit --json | jq '.metadata.vulnerabilities.critical // 0')
        HIGH=$(npm audit --json | jq '.metadata.vulnerabilities.high // 0')
        
        echo "Critical vulnerabilities: $CRITICAL"
        echo "High vulnerabilities: $HIGH"
        
        if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
          echo "::error::Found $CRITICAL critical and $HIGH high vulnerabilities"
          exit 1
        fi

    - name: Dependabot alerts check
      if: github.event_name == 'pull_request'
      run: |
        echo "::notice::This PR will be checked for Dependabot alerts automatically"