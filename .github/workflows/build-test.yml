name: Build and Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Run tests
      run: npm run test:api

    - name: Run linting
      run: npm run lint

    - name: Build API Docker image
      run: |
        docker build -t api:${{ github.sha }} ./api

    - name: Build Frontend Docker image
      run: |
        docker build -t frontend:${{ github.sha }} ./frontend

    - name: Test Docker images
      run: |
        docker images | grep -E "(api|frontend):${{ github.sha }}"